name: Build whisper.cpp (Hexagon HTP v81)

on:
  workflow_dispatch:
    inputs:
      whisper_branch:
        description: 'whisper.cpp branch'
        default: 'master'
        required: true

jobs:
  build-android-hexagon:
    runs-on: ubuntu-latest
    steps:
      - name: 检出仓库
        uses: actions/checkout@v4
        with:
          repository: 'ggml-org/whisper.cpp'
          ref: ${{ github.event.inputs.whisper_branch }}
          submodules: recursive

      - name: 安装编译依赖工具
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build wget xz-utils

      - name: 下载并设置 Android NDK r28
        run: |
          cd /tmp
          wget -q https://dl.google.com/android/repository/android-ndk-r28-linux.zip
          unzip -q android-ndk-r28-linux.zip
          echo "ANDROID_NDK=/tmp/android-ndk-r28" >> $GITHUB_ENV

            - name: 下载并解压 Hexagon SDK v6.6.0.0
        run: |
          cd /tmp
          wget -q https://github.com/snapdragon-toolchain/hexagon-sdk/releases/download/v6.6.0.0/hexagon-sdk-v6.6.0.0-amd64-lnx.tar.xz
          tar -xf hexagon-sdk-v6.6.0.0-amd64-lnx.tar.xz
          
          echo "=== 检查解压后的目录结构 ==="
          ls -la /tmp/hexagon-sdk/
          
          # 用 hexagon_sdk.json 定位 SDK 根目录（不管目录结构怎样）
          JSON_FILE=$(find /tmp/hexagon-sdk -name "hexagon_sdk.json" -type f | head -1)
          if [ -n "$JSON_FILE" ]; then
            SDK_DIR=$(dirname "$JSON_FILE")
            echo "Found SDK at: $SDK_DIR"
            echo "HEXAGON_SDK_ROOT=$SDK_DIR" >> $GITHUB_ENV
            echo "HEXAGON_TOOLS_ROOT=$SDK_DIR/tools/HEXAGON_Tools/19.0.07" >> $GITHUB_ENV
          else
            echo "ERROR: hexagon_sdk.json not found!"
            find /tmp/hexagon-sdk -type f | head -20
            exit 1
          fi

      - name: 修复官方 SDK 的 CMake 兼容性问题
        run: |
          # 先找到 hexagon_fun.cmake 的实际路径
          CMAKE_FILE=$(find /tmp/hexagon-sdk -name "hexagon_fun.cmake" -type f | head -1)
          if [ -n "$CMAKE_FILE" ]; then
            echo "Found hexagon_fun.cmake at: $CMAKE_FILE"
            sed -i '99,106s/^/# /' "$CMAKE_FILE"
            echo "Patched successfully"
          else
            echo "hexagon_fun.cmake not found, skipping patch"
          fi

      - name: 应用乱码修复补丁
        run: |
          # 补丁1: 修复缓存一致性 - hex-dma.c
          if [ -f ggml/src/ggml-hexagon/htp/hex-dma.c ]; then
            sed -i 's/memcpy(dst, src, size);/asm volatile("dmb ishst" ::: "memory"); memcpy(dst, src, size);/' ggml/src/ggml-hexagon/htp/hex-dma.c
          fi
          
          # 补丁2: 修复 ION 内存对齐 - ggml-hexagon.cpp
          if [ -f ggml/src/ggml-hexagon/ggml-hexagon.cpp ]; then
            sed -i 's/4095/65535/' ggml/src/ggml-hexagon/ggml-hexagon.cpp
          fi
          
          # 补丁3: 强制 v81 架构检测 - htp-drv.cpp
          if [ -f ggml/src/ggml-hexagon/htp-drv.cpp ]; then
            sed -i 's/return 73;/return 81;/' ggml/src/ggml-hexagon/htp-drv.cpp
          fi

      - name: 配置 CMake (启用 Hexagon 后端, v81 架构)
        run: |
          mkdir -p build && cd build
          cmake .. \
            -DGGML_HEXAGON=ON \
            -DCMAKE_TOOLCHAIN_FILE=${{ env.ANDROID_NDK }}/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=latest \
            -DHEXAGON_SDK_ROOT=${{ env.HEXAGON_SDK_ROOT }} \
            -DHEXAGON_TOOLS_ROOT=${{ env.HEXAGON_TOOLS_ROOT }} \
            -DHTP_ARCH_VERSION=v81 \
            -DCMAKE_BUILD_TYPE=Release

      - name: 开始多线程编译
        run: |
          cd build
          make -j$(nproc)

      - name: 打包编译产物
        run: |
          mkdir -p pkg
          find build -name "*.so" -o -name "*.so.*" | xargs -I{} cp {} pkg/
          find build/bin -type f -executable | xargs -I{} cp {} pkg/ 2>/dev/null || true
          cd pkg && zip -r ../whisper-hexagon-v81.zip . && cd ..

      - name: 上传编译产物 (Artifacts)
        uses: actions/upload-artifact@v4
        with:
          name: whisper-hexagon-v81-android
          path: whisper-hexagon-v81.zip
          if-no-files-found: error

      - name: 创建 Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v81-build-${{ github.run_number }}
          name: Whisper Hexagon v81 Build #${{ github.run_number }}
          body: |
            Android Hexagon v81 构建产物 (SM8850)
            
            ## 已应用的乱码修复补丁
            1. **hex-dma.c**: 添加 AP↔DSP 缓存同步（`dmb ishst`）
            2. **ggml-hexagon.cpp**: ION 内存 64KB 对齐
            3. **htp-drv.cpp**: 强制使用 v81 架构
            
            ## 使用
            ```bash
            adb push *.so /data/local/tmp/
            adb push whisper-cli /data/local/tmp/
            adb shell "export LD_LIBRARY_PATH=/data/local/tmp; export ADSP_LIBRARY_PATH=/data/local/tmp; export GGML_HEXAGON_ARCH=81; cd /data/local/tmp; ./whisper-cli -m model.bin -f audio.wav"
            ```
          files: whisper-hexagon-v81.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
