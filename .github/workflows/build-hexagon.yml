name: Build Whisper.cpp Android Hexagon v81

on:
  workflow_dispatch:
    inputs:
      whisper_branch:
        description: 'whisper.cpp branch'
        default: 'master'
        required: true
      ndk_version:
        description: 'Android NDK version'
        default: 'r28b'
        required: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    
    env:
      ANDROID_ABI: arm64-v8a
      ANDROID_API: 28
      # 关键：设置环境变量让 hexagon_fun.cmake 能自动检测
      HEXAGON_SDK_ROOT: ${{ github.workspace }}/hexagon-sdk/6.6.0.0
      HEXAGON_TOOLS_ROOT: ${{ github.workspace }}/hexagon-sdk/6.6.0.0/tools/HEXAGON_Tools/19.0.07

    steps:
      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build git wget unzip zip

      - name: Setup Android NDK
        run: |
          wget -q "https://dl.google.com/android/repository/android-ndk-${{ github.event.inputs.ndk_version }}-linux.zip" -O ndk.zip
          unzip -q ndk.zip && mv android-ndk-* android-ndk
          echo "ANDROID_NDK=$PWD/android-ndk" >> $GITHUB_ENV

      - name: Setup Hexagon SDK
        run: |
          SDK_URL="https://github.com/snapdragon-toolchain/hexagon-sdk/releases/download/v6.6.0.0/hexagon-sdk-v6.6.0.0-amd64-lnx.tar.xz"
          echo "Downloading from $SDK_URL"
          wget -q --show-progress "$SDK_URL" -O hexagon-sdk.tar.xz
          
          mkdir -p hexagon-sdk
          tar -xJf hexagon-sdk.tar.xz -C hexagon-sdk/
          
          echo "=== SDK structure ==="
          ls -la hexagon-sdk/
          
          # 确保目录结构正确
          if [ -d "hexagon-sdk/6.6.0.0" ]; then
            echo "SDK at hexagon-sdk/6.6.0.0"
          else
            echo "Reorganizing SDK structure..."
            mv hexagon-sdk hexagon-sdk-tmp
            mkdir -p hexagon-sdk/6.6.0.0
            mv hexagon-sdk-tmp/* hexagon-sdk/6.6.0.0/ 2>/dev/null || true
            rm -rf hexagon-sdk-tmp
          fi
          
          echo "=== Final SDK structure ==="
          ls -la hexagon-sdk/6.6.0.0/
          find hexagon-sdk/6.6.0.0 -maxdepth 3 -type d | sort | head -30
          
          echo "=== Checking hexagon_sdk.json ==="
          cat hexagon-sdk/6.6.0.0/hexagon_sdk.json 2>/dev/null || echo "No hexagon_sdk.json"
          
          echo "=== Checking tools ==="
          ls -la hexagon-sdk/6.6.0.0/tools/HEXAGON_Tools/ 2>/dev/null || echo "No HEXAGON_Tools"

      - name: Checkout whisper.cpp
        uses: actions/checkout@v4
        with:
          repository: ggml-org/whisper.cpp
          ref: ${{ github.event.inputs.whisper_branch }}
          submodules: recursive
          path: whisper.cpp

      - name: Apply patches
        working-directory: whisper.cpp
        run: |
          # 用 sed 直接修改，单行处理避免YAML问题
          if [ -f ggml/src/ggml-hexagon/htp/hex-dma.c ]; then
            sed -i 's/memcpy(dst, src, size);/asm volatile("dmb ishst" ::: "memory"); memcpy(dst, src, size);/' ggml/src/ggml-hexagon/htp/hex-dma.c 2>/dev/null || true
          fi
          if [ -f ggml/src/ggml-hexagon/ggml-hexagon.cpp ]; then
            sed -i 's/4095/65535/' ggml/src/ggml-hexagon/ggml-hexagon.cpp 2>/dev/null || true
          fi
          if [ -f ggml/src/ggml-hexagon/htp-drv.cpp ]; then
            sed -i 's/return 73;/return 81;/' ggml/src/ggml-hexagon/htp-drv.cpp 2>/dev/null || true
          fi

      - name: Configure CMake
        working-directory: whisper.cpp
        run: |
          # 设置环境变量让 hexagon_fun.cmake 自动检测
          export HEXAGON_SDK_ROOT="${{ github.workspace }}/hexagon-sdk/6.6.0.0"
          export HEXAGON_TOOLS_ROOT="${{ github.workspace }}/hexagon-sdk/6.6.0.0/tools/HEXAGON_Tools/19.0.07"
          
          echo "HEXAGON_SDK_ROOT=$HEXAGON_SDK_ROOT"
          echo "HEXAGON_TOOLS_ROOT=$HEXAGON_TOOLS_ROOT"
          
          cmake -B build \
            -G Ninja \
            -DCMAKE_TOOLCHAIN_FILE="$ANDROID_NDK/build/cmake/android.toolchain.cmake" \
            -DANDROID_ABI="$ANDROID_ABI" \
            -DANDROID_PLATFORM="android-$ANDROID_API" \
            -DANDROID_STL=c++_shared \
            -DCMAKE_BUILD_TYPE=Release \
            -DGGML_HEXAGON=ON \
            -DGGML_OPENMP=OFF \
            -DWHISPER_BUILD_EXAMPLES=ON \
            -DWHISPER_BUILD_TESTS=ON

      - name: Build
        working-directory: whisper.cpp
        run: cmake --build build --parallel $(nproc)

      - name: Package
        working-directory: whisper.cpp
        run: |
          mkdir -p pkg
          find build -name "*.so" -o -name "*.so.*" | xargs -I{} cp {} pkg/
          find build/bin -type f -executable | xargs -I{} cp {} pkg/ 2>/dev/null || true
          cd pkg && zip -r ../whisper-hexagon-v81.zip . && cd ..
          ls -la pkg/

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: whisper-hexagon-v81-android
          path: whisper.cpp/whisper-hexagon-v81.zip
          retention-days: 30

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v81-build-${{ github.run_number }}
          name: Whisper Hexagon v81 Build #${{ github.run_number }}
          body: |
            Android Hexagon v81 构建产物 (SM8850)
            
            ## 使用
            ```bash
            adb push *.so /data/local/tmp/
            adb push whisper-cli /data/local/tmp/
            adb shell "export LD_LIBRARY_PATH=/data/local/tmp; export ADSP_LIBRARY_PATH=/data/local/tmp; export GGML_HEXAGON_ARCH=81; cd /data/local/tmp; ./whisper-cli -m model.bin -f audio.wav"
            ```
          files: whisper.cpp/whisper-hexagon-v81.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
