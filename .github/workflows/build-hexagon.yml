name: Build whisper.cpp (Hexagon HTP v81)

on:
  workflow_dispatch:
    inputs:
      whisper_branch:
        description: 'whisper.cpp branch'
        default: 'master'
        required: true

# 👇【新增修复1】：显式赋予创建 Release 的写入权限
permissions:
  contents: write

jobs:
  build-android-hexagon:
    runs-on: ubuntu-latest
    steps:
      - name: 检出仓库
        uses: actions/checkout@v4
        with:
          repository: 'ggml-org/whisper.cpp'
          ref: ${{ github.event.inputs.whisper_branch }}
          submodules: recursive

      - name: 安装编译依赖工具
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build wget xz-utils

      - name: 下载并设置 Android NDK r28
        run: |
          cd /tmp
          wget -q https://dl.google.com/android/repository/android-ndk-r28-linux.zip
          unzip -q android-ndk-r28-linux.zip
          echo "ANDROID_NDK=/tmp/android-ndk-r28" >> $GITHUB_ENV

      - name: 下载并解压 Hexagon SDK v6.6.0.0
        run: |
          cd /tmp
          wget -q https://github.com/snapdragon-toolchain/hexagon-sdk/releases/download/v6.6.0.0/hexagon-sdk-v6.6.0.0-amd64-lnx.tar.xz
          tar -xf hexagon-sdk-v6.6.0.0-amd64-lnx.tar.xz
          # 动态自动定位包含 'incs' 的真实根目录
          SDK_ROOT=$(find /tmp -maxdepth 3 -type d -name "incs" 2>/dev/null | head -n 1 | xargs dirname)
          if [ -n "$SDK_ROOT" ]; then
            echo "HEXAGON_SDK_ROOT=$SDK_ROOT" >> $GITHUB_ENV
            echo "✅ 成功定位 SDK 真实根目录: $SDK_ROOT"
            TOOLS_PATH=$(find $SDK_ROOT -path "*/HEXAGON_Tools/19.0.07" 2>/dev/null | head -n 1)
            if [ -n "$TOOLS_PATH" ]; then
              echo "HEXAGON_TOOLS_ROOT=$TOOLS_PATH" >> $GITHUB_ENV
              echo "✅ 成功定位 Tools 目录: $TOOLS_PATH"
            else
              echo "❌ 错误: 在 SDK 根目录下未发现 HEXAGON_Tools/19.0.07！"
              exit 1
            fi
          else
            echo "❌ 错误: 解压后未找到包含 'incs' 文件夹的 SDK 目录，请检查解压包！"
            exit 1
          fi

      - name: 修复官方 SDK 的 CMake 兼容性问题
        run: |
          CMAKE_FILE=$(find /tmp -path "*/build/cmake/hexagon_fun.cmake" 2>/dev/null | head -n 1)
          if [ -n "$CMAKE_FILE" ]; then
            sed -i '99,106s/^/# /' "$CMAKE_FILE"
            echo "✅ 成功修复 CMake 文件: $CMAKE_FILE"
          else
            echo "⚠️ 未找到 hexagon_fun.cmake，跳过修复步骤。"
          fi

      - name: 应用乱码修复补丁
        run: |
          # 补丁1: 修复缓存一致性 - hex-dma.c（双向屏障）
          HEX_DMA="ggml/src/ggml-hexagon/htp/hex-dma.c"
          if [ -f "$HEX_DMA" ]; then
            echo "=== hex-dma.c 原始 memcpy ==="
            grep -n "memcpy(dst, src, size)" "$HEX_DMA" || true
            sed -i 's/memcpy(dst, src, size);/asm volatile("dmb ishst" ::: "memory");\n    memcpy(dst, src, size);\n    asm volatile("dsb ish" ::: "memory");/' "$HEX_DMA"
            echo "✅ 修复 hex-dma.c 双向屏障"
          else
            echo "⚠️ 未找到 hex-dma.c"
          fi
          
          # 补丁2: 修复 ION 内存对齐 - ggml-hexagon.cpp
          HEX_CPP="ggml/src/ggml-hexagon/ggml-hexagon.cpp"
          if [ -f "$HEX_CPP" ]; then
            sed -i 's/4095/65535/' "$HEX_CPP"
            echo "✅ 修复 ION 64KB 对齐"
          fi
          
          # 补丁3: 强制 v81 架构检测 - htp-drv.cpp
          # strings 显示 so 里有 "defaulting to v73"
          DRV_FILE="ggml/src/ggml-hexagon/htp-drv.cpp"
          if [ -f "$DRV_FILE" ]; then
            echo "=== htp-drv.cpp 架构相关代码 ==="
            grep -n "defaulting\|v73\|return.*73\|return.*81" "$DRV_FILE" || true
            sed -i 's/defaulting to v73/defaulting to v81/' "$DRV_FILE"
            sed -i 's/return 73;/return 81;/g' "$DRV_FILE"
            sed -i 's/return 79;/return 81;/g' "$DRV_FILE"
            echo "✅ 强制 v81 架构"
          fi
          
          # 补丁4: 修复 HAP_power_set_HMX 指针错误（ggml官方已知bug）
          MAIN_FILE="ggml/src/ggml-hexagon/htp/main.c"
          if [ -f "$MAIN_FILE" ]; then
            echo "=== main.c HAP_power_set ==="
            grep -n "HAP_power_set" "$MAIN_FILE" || true
            sed -i 's/HAP_power_set((void \*) \&ctx/HAP_power_set((void *) ctx/g' "$MAIN_FILE"
            echo "✅ 修复 HAP_power_set 指针"
          else
            echo "⚠️ 未找到 main.c"
          fi

      - name: 配置 CMake (启用 Hexagon 后端, v81 架构)
        run: |
          mkdir -p build && cd build
          cmake .. \
            -DGGML_HEXAGON=ON \
            -DCMAKE_TOOLCHAIN_FILE=${{ env.ANDROID_NDK }}/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=latest \
            -DHEXAGON_SDK_ROOT=${{ env.HEXAGON_SDK_ROOT }} \
            -DHEXAGON_TOOLS_ROOT=${{ env.HEXAGON_TOOLS_ROOT }} \
            -DHTP_ARCH_VERSION=v81 \
            -DCMAKE_BUILD_TYPE=Release

      - name: 开始多线程编译
        run: |
          cd build
          make -j$(nproc)

      - name: 打包编译产物
        run: |
          mkdir -p pkg
          find build -name "*.so" | xargs -I{} cp {} pkg/
          find build -name "*.so.*" | xargs -I{} cp {} pkg/
          find build -path "*ggml-hexagon*" -name "libggml-htp*.so" -exec cp {} pkg/ \;
          find build/bin -type f -executable | xargs -I{} cp {} pkg/ 2>/dev/null || true
          cd pkg && zip -r ../whisper-hexagon-v81.zip . && cd ..
          echo "=== 打包内容 ==="
          ls -la pkg/

      - name: 上传编译产物 (Artifacts)
        uses: actions/upload-artifact@v4
        with:
          name: whisper-hexagon-v81-android
          path: whisper-hexagon-v81.zip
          if-no-files-found: error

      # 👇【新增修复2】：升级创建 Release 的 Action 版本到 v2
      - name: 创建 Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v81-build-${{ github.run_number }}
          name: Whisper Hexagon v81 Build #${{ github.run_number }}
          body: |
            Android Hexagon v81 构建产物 (SM8850)
            
            ## 已应用的乱码修复补丁
            1. **hex-dma.c**: 添加 AP↔DSP 缓存同步（`dmb ishst`）
            2. **ggml-hexagon.cpp**: ION 内存 64KB 对齐
            3. **htp-drv.cpp**: 强制使用 v81 架构
            
            ## 使用
            ```bash
            adb push *.so /data/local/tmp/
            adb push whisper-cli /data/local/tmp/
            adb shell "export LD_LIBRARY_PATH=/data/local/tmp; export ADSP_LIBRARY_PATH=/data/local/tmp; export GGML_HEXAGON_ARCH=81; cd /data/local/tmp; ./whisper-cli -m model.bin -f audio.wav"
            ```
          files: whisper-hexagon-v81.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
