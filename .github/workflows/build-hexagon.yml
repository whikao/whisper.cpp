name: Build whisper.cpp (Hexagon HTP v81)

on:
  workflow_dispatch:
    inputs:
      whisper_branch:
        description: 'whisper.cpp branch'
        default: 'master'
        required: true

# 显式赋予创建 Release 的写入权限
permissions:
  contents: write

jobs:
  build-android-hexagon:
    runs-on: ubuntu-latest
    steps:
      - name: 检出仓库
        uses: actions/checkout@v4
        with:
          repository: 'ggml-org/whisper.cpp'
          ref: ${{ github.event.inputs.whisper_branch }}
          submodules: recursive

      - name: 安装编译依赖工具
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build wget xz-utils

      - name: 下载并设置 Android NDK r28
        run: |
          cd /tmp
          wget -q https://dl.google.com/android/repository/android-ndk-r28-linux.zip
          unzip -q android-ndk-r28-linux.zip
          echo "ANDROID_NDK=/tmp/android-ndk-r28" >> $GITHUB_ENV

      - name: 下载并解压 Hexagon SDK v6.6.0.0
        run: |
          cd /tmp
          wget -q https://github.com/snapdragon-toolchain/hexagon-sdk/releases/download/v6.6.0.0/hexagon-sdk-v6.6.0.0-amd64-lnx.tar.xz
          tar -xf hexagon-sdk-v6.6.0.0-amd64-lnx.tar.xz
          # 动态自动定位包含 'incs' 的真实根目录
          SDK_ROOT=$(find /tmp -maxdepth 3 -type d -name "incs" 2>/dev/null | head -n 1 | xargs dirname)
          if [ -n "$SDK_ROOT" ]; then
            echo "HEXAGON_SDK_ROOT=$SDK_ROOT" >> $GITHUB_ENV
            echo "✅ 成功定位 SDK 真实根目录: $SDK_ROOT"
            TOOLS_PATH=$(find $SDK_ROOT -path "*/HEXAGON_Tools/19.0.07" 2>/dev/null | head -n 1)
            if [ -n "$TOOLS_PATH" ]; then
              echo "HEXAGON_TOOLS_ROOT=$TOOLS_PATH" >> $GITHUB_ENV
              echo "✅ 成功定位 Tools 目录: $TOOLS_PATH"
            else
              echo "❌ 错误: 在 SDK 根目录下未发现 HEXAGON_Tools/19.0.07！"
              exit 1
            fi
          else
            echo "❌ 错误: 解压后未找到包含 'incs' 文件夹的 SDK 目录，请检查解压包！"
            exit 1
          fi

      - name: 修复官方 SDK 的 CMake 兼容性问题
        run: |
          CMAKE_FILE=$(find /tmp -path "*/build/cmake/hexagon_fun.cmake" 2>/dev/null | head -n 1)
          if [ -n "$CMAKE_FILE" ]; then
            sed -i '99,106s/^/# /' "$CMAKE_FILE"
            echo "✅ 成功修复 CMake 文件: $CMAKE_FILE"
          else
            echo "⚠️ 未找到 hexagon_fun.cmake，跳过修复步骤。"
          fi

      # 【核心改动】用 llama.cpp 最新的 ggml-hexagon 整体覆盖 whisper.cpp 自带的旧版
      # whisper.cpp 的 hexagon 同步停在 7-10，新版额外包含：
      #   7-16  L2 缓存一致性重做（dirty bit 跟踪 + 延迟刷写）← 治乱码的主力修复
      #   7-14  hmx-queue 信号枚举修复
      #   7-20  CLAMP 算子；MUL_MAT / FLASH_ATTN 管线优化
      # 旧的 4 个 sed 补丁全部废弃（hex-dma.c 在新版中已被官方删除重写，
      # HAP_power_set 指针问题官方早已修复，架构检测在 SM8850 上本就正常）
      - name: 覆盖最新 ggml-hexagon（含 L2 缓存重做 + HMX 修复）
        run: |
          git clone --depth 1 https://github.com/ggml-org/llama.cpp.git /tmp/llama
          rm -rf ggml/src/ggml-hexagon
          cp -r /tmp/llama/ggml/src/ggml-hexagon ggml/src/
          cp -f /tmp/llama/ggml/include/ggml-hexagon.h ggml/include/ggml-hexagon.h
          echo "=== 覆盖完成，新版关键默认值（应显示 mm_select=3 / fa_select=2）==="
          grep -n "opt_mm_select = \|opt_fa_select = " ggml/src/ggml-hexagon/ggml-hexagon.cpp || true
          echo "=== 确认新版文件就位（应有 dma-queue.c / work-queue.c / htp-tensor.c）==="
          ls ggml/src/ggml-hexagon/htp/ || true

      - name: 配置 CMake (启用 Hexagon 后端, v81 架构)
        run: |
          mkdir -p build && cd build
          cmake .. \
            -DGGML_HEXAGON=ON \
            -DGGML_CPU_ARM_ARCH=armv9.2-a+i8mm+sme2 \
            -DCMAKE_TOOLCHAIN_FILE=${{ env.ANDROID_NDK }}/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=latest \
            -DHEXAGON_SDK_ROOT=${{ env.HEXAGON_SDK_ROOT }} \
            -DHEXAGON_TOOLS_ROOT=${{ env.HEXAGON_TOOLS_ROOT }} \
            -DHTP_ARCH_VERSION=v81 \
            -DCMAKE_BUILD_TYPE=Release

      - name: 开始多线程编译
        run: |
          cd build
          make -j$(nproc)

      - name: 打包编译产物
        run: |
          mkdir -p pkg
          find build -name "*.so" | xargs -I{} cp {} pkg/
          find build -name "*.so.*" | xargs -I{} cp {} pkg/
          find build -path "*ggml-hexagon*" -name "libggml-htp*.so" -exec cp {} pkg/ \;
          find build/bin -type f -executable | xargs -I{} cp {} pkg/ 2>/dev/null || true
          cd pkg && zip -r ../whisper-hexagon-v81.zip . && cd ..
          echo "=== 打包内容 ==="
          ls -la pkg/

      - name: 上传编译产物 (Artifacts)
        uses: actions/upload-artifact@v4
        with:
          name: whisper-hexagon-v81-android
          path: whisper-hexagon-v81.zip
          if-no-files-found: error

      - name: 创建 Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v81-build-${{ github.run_number }}
          name: Whisper Hexagon v81 Build #${{ github.run_number }}
          body: |
            Android Hexagon v81 构建产物 (SM8850)

            ## 本版改动
            - 用 llama.cpp 最新 ggml-hexagon 整体覆盖（whisper.cpp 自带版停在 7-10）
            - 新增：L2 缓存一致性重做（dirty bit 跟踪 + 延迟刷写）
            - 新增：hmx-queue 修复、MUL_MAT / FLASH_ATTN 管线优化
            - 已废弃旧的 4 个 sed 补丁（hex-dma.c 在新版中被官方删除重写）

            ## Termux 使用
            ```bash
            export LD_LIBRARY_PATH=.:/vendor/lib64
            # 模型必须用 Q4_0 / Q4_1 / Q8_0（Q5_0 不支持 NPU 加速）
            # 直接跑（缓存修复后 HMX 应可正常工作）：
            ./whisper-cli -m ggml-large-v3-turbo-q8_0.bin -f audio.wav --output-srt
            # 若仍乱码按序尝试：
            # GGML_HEXAGON_FA_SELECT=1 ./whisper-cli ...
            # GGML_HEXAGON_OPFILTER="FLASH_ATTN_EXT" ./whisper-cli ...
            ```
            注意：whisper-cli、libggml*.so、libggml-htp-v81.so 必须整套换新，不要新旧混用
          files: whisper-hexagon-v81.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
