name: Build whisper.cpp (Vulkan Adreno)

on:
  workflow_dispatch:
  push:
    branches: [ master, main ]

env:
  WHISPER_REPO: ggml-org/whisper.cpp
  WHISPER_REF: master
  NDK_VERSION: r27c

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout whisper.cpp
        uses: actions/checkout@v4
        with:
          repository: ${{ env.WHISPER_REPO }}
          ref: ${{ env.WHISPER_REF }}
          path: whisper.cpp

      - name: Install glslc + deps (x86 新版，编 shader 用)
        run: |
          sudo apt-get update
          sudo apt-get install -y glslc spirv-headers cmake ninja-build
          glslc --version   # 日志里确认版本够新

      - name: Setup Android NDK
        run: |
          wget -q https://dl.google.com/android/repository/android-ndk-${{ env.NDK_VERSION }}-linux.zip
          unzip -q android-ndk-${{ env.NDK_VERSION }}-linux.zip
          echo "ANDROID_NDK=$GITHUB_WORKSPACE/android-ndk-${{ env.NDK_VERSION }}" >> $GITHUB_ENV

      - name: Configure (cross-compile aarch64 + Vulkan)
        working-directory: whisper.cpp
        run: |
          SYSROOT=$ANDROID_NDK/toolchains/llvm/prebuilt/linux-x86_64/sysroot

          cmake -B build-vk -G Ninja \
            -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-28 \
            -DCMAKE_BUILD_TYPE=Release \
            -DGGML_VULKAN=ON \
            -DGGML_NATIVE=OFF \
            -DCMAKE_C_FLAGS="-march=armv9.2-a+dotprod+fp16+i8mm+sve2+sme" \
            -DCMAKE_CXX_FLAGS="-march=armv9.2-a+dotprod+fp16+i8mm+sve2+sme" \
            -DVulkan_LIBRARY=$SYSROOT/usr/lib/aarch64-linux-android/28/libvulkan.so \
            -DVulkan_INCLUDE_DIR=$SYSROOT/usr/include \
            -DBUILD_SHARED_LIBS=ON \
            -DGGML_BUILD_EXAMPLES=ON \
            -DWHISPER_BUILD_EXAMPLES=ON \
            -DWHISPER_BUILD_TESTS=OFF \
            -DWHISPER_BUILD_SERVER=OFF

      - name: Build
        working-directory: whisper.cpp
        run: cmake --build build-vk -j$(nproc)

      - name: Package binaries
        run: |
          mkdir -p dist
          cp whisper.cpp/build-vk/bin/whisper-cli dist/ 2>/dev/null || \
          cp whisper.cpp/build-vk/bin/main dist/whisper-cli
          cp whisper.cpp/build-vk/bin/*.so dist/ 2>/dev/null || true
          find whisper.cpp/build-vk -name "libggml*.so" -exec cp {} dist/ \;
          ls -la dist/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: whisper-vulkan-adreno-arm64
          path: dist/
          compression-level: 0
          retention-days: 7
